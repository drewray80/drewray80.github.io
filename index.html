<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Europe Trip 2026</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Navbar Section -->
        <nav class="navbar">
            <div class="navbar__container">
                <a href="#home" id="navbar__logo">Europe 2026</a>
                <!-- <div class="navbar__toggle" id="mobile-menu">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>  -->
                <ul class="navbar__menu">
                    <li class="navbar__item">
                        <a href="#home" class="navbar__links" id="top-page">Top</a>
                    </li>
                    <li class="navbar__item">
                        <a href="#spain" class="navbar__links" id="spain-page">Spain</a>
                    </li>
                    <li class="navbar__item">
                        <a href="#france" class="navbar__links" id="france-page">France</a>
                    </li>
                    <li class="navbar__item">
                        <a href="#italy" class="navbar__links" id="italy-page">Italy</a>
                    </li>
                    <li class="navbar__item">
                        <a href="#germany" class="navbar__links" id="germany-page">Germany</a>
                    </li>
                </ul>
            </div>
        </nav>
        
        <!-- Hero Section -->
        <div class="hero" id="home">

        </div>
        
        <!-- Spain -->
        <div class="spain_header" id="spain">
                <div>
                    <h2>España</h2>
                </div>
                <div id="spain_flag">
                    <img src="./img/spanish-flag.png" width="300"  alt="Spanish flag">
                </div>
        </div>
        <div class="spain_header">
                <div>
                    <h2>Barcelona</h2>
                </div>
        </div>
        <div class="gallery" id="spain_gallery">
            <div class="galleryItem">
                <h1 class="galleryTitle">Gothic Quarter</h1>
                <img src="./img/barcelona/narrow_street.jpeg" alt="" class="galleryImg">
            </div>
            <div class="galleryItem">
                <img src="./img/barcelona/madona.jpeg"
                    alt="" class="galleryImg">
                <h1 class="galleryTitle">Barcelona Cathedral</h1>
            </div>
            <div class="galleryItem">
                <h1 class="galleryTitle">Sagrada Familia</h1>
                <img src="./img/barcelona/sagrada.jpeg"
                    alt="" class="galleryImg">
            </div>
            <div class="galleryItem">
                <img src="./img/barcelona/paella_club.jpeg"
                    alt="" class="galleryImg">
                <h1 class="galleryTitle"><a href="https://thepaellaclub.com/" target="_blank">Paella Club</a></h1>
            </div>
            <div class="galleryItem">
                <h1 class="galleryTitle">Fuente Mágico</h1>
                <img src="./img/barcelona/fuente_magico.jpeg"
                    alt="" class="galleryImg">
            </div>
        </div>
    
        </div>
        
        <!-- France -->
        <div class="france_header" id="france">
                <div>
                    <h2>France</h2>
                </div>
                <div id="france_flag">
                    <img src="./img/france_flag.png" width="300"  alt="French flag">
                </div>
        </div>
        <div class="france_header">
                <div>
                    <h2>Cassis</h2>
                </div>
        </div>
        <div class="gallery" id="france_gallery">
            <div class="galleryItem">
                <h1 class="galleryTitle">Plage du Bestouan</h1>
                <img src="./img/cassis/IMG_6456.JPG" alt="" class="galleryImg">
            </div>
            <div class="galleryItem">
                <img src="./img/cassis/IMG_6457.JPG"
                    alt="" class="galleryImg">
                <h1 class="galleryTitle">Calanques</h1>
            </div>
            <div class="galleryItem">
                <h1 class="galleryTitle">Quai St. <br>Pierre</h1>
                <img src="./img/cassis/IMG_6457 (1).JPG"
                    alt="" class="galleryImg">
            </div>
            <div class="galleryItem">
                <img src="./img/cassis/IMG_6457.JPG"
                    alt="" class="galleryImg">
                <h1 class="galleryTitle">Calanque de Port-Miou</h1>
            </div>
            <div class="galleryItem">
                <h1 class="galleryTitle">Phare de Cassis</h1>
                <img src="./img/cassis/IMG_6458.JPG"
                    alt="" class="galleryImg">
            </div>
        </div>
        <div class="france_header">
                <div>
                    <h2>Ajaccio</h2>
                </div>
        </div>
        <!-- Italy -->
        <div class="italy">

        </div>

        <!-- Germany -->
        <div class="germany">

        </div>
        
        <script src="app.js"></script>
    </body>
</html>
